<!DOCTYPE html>
<html lang="th" data-theme="light">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Cards ♡</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <div class="card">

    <!-- Dark mode toggle -->
    <label class="theme-toggle" title="Toggle dark mode">
      <span class="toggle-icon">☀️</span>
      <div class="toggle-track">
        <div class="toggle-knob"></div>
      </div>
      <span class="toggle-icon">🌙</span>
      <input type="checkbox" id="themeToggle" style="display:none" onchange="toggleTheme(this)" />
    </label>

    <div class="tagline">My Cards ♡</div>

    <!-- Name -->
    <div class="name-field">
      <input type="text" placeholder="Name" id="nameInput" />
    </div>

    <!-- Age / Gender / Zodiac -->
    <div class="meta-row">
      <div class="meta-item">
        <span class="meta-label">Age</span>
        <input type="number" placeholder="—" min="1" max="999" oninput="this.value=this.value.replace(/[^0-9]/g,'')" />
      </div>
      <div class="meta-item">
        <span class="meta-label">Gender</span>
        <div class="select-wrap">
          <select>
            <option value="">—</option>
            <option>Male</option>
            <option>Female</option>
            <option>LGBTQIA+</option>
          </select>
        </div>
      </div>
      <div class="meta-item">
        <span class="meta-label">Zodiac</span>
        <div class="select-wrap">
          <select>
            <option value="">—</option>
            <option>♈ Aries</option>
            <option>♉ Taurus</option>
            <option>♊ Gemini</option>
            <option>♋ Cancer</option>
            <option>♌ Leo</option>
            <option>♍ Virgo</option>
            <option>♎ Libra</option>
            <option>♏ Scorpio</option>
            <option>♐ Sagittarius</option>
            <option>♑ Capricorn</option>
            <option>♒ Aquarius</option>
            <option>♓ Pisces</option>
          </select>
        </div>
      </div>
    </div>

    <!-- Grid -->
    <div class="grid">

      <!-- Row 1 -->
      <div class="cell c-mbti">
        <span class="cell-label">MBTI</span>
        <div class="cell-img"></div>
        <div class="cell-add"><svg viewBox="0 0 24 24">
            <rect x="3" y="3" width="18" height="18" rx="2" />
            <circle cx="8.5" cy="8.5" r="1.5" />
            <polyline points="21 15 16 10 5 21" />
          </svg><span>photo</span></div>
        <button class="cell-rm" onclick="rmImg(event,this)">✕</button>
        <input class="cell-file" type="file" onchange="loadImg(event,this)" />
      </div>

      <div class="cell c-food">
        <span class="cell-label">Food</span>
        <div class="cell-img"></div>
        <div class="cell-add"><svg viewBox="0 0 24 24">
            <rect x="3" y="3" width="18" height="18" rx="2" />
            <circle cx="8.5" cy="8.5" r="1.5" />
            <polyline points="21 15 16 10 5 21" />
          </svg><span>photo</span></div>
        <button class="cell-rm" onclick="rmImg(event,this)">✕</button>
        <input class="cell-file" type="file" onchange="loadImg(event,this)" />
      </div>

      <div class="cell c-char">
        <span class="cell-label">Character</span>
        <div class="cell-img"></div>
        <div class="cell-add"><svg viewBox="0 0 24 24">
            <rect x="3" y="3" width="18" height="18" rx="2" />
            <circle cx="8.5" cy="8.5" r="1.5" />
            <polyline points="21 15 16 10 5 21" />
          </svg><span>photo</span></div>
        <button class="cell-rm" onclick="rmImg(event,this)">✕</button>
        <input class="cell-file" type="file" onchange="loadImg(event,this)" />
      </div>

      <div class="cell c-color c-col4">
        <span class="cell-label">Color</span>
        <div class="cell-img"></div>
        <div class="cell-add"><svg viewBox="0 0 24 24">
            <rect x="3" y="3" width="18" height="18" rx="2" />
            <circle cx="8.5" cy="8.5" r="1.5" />
            <polyline points="21 15 16 10 5 21" />
          </svg><span>photo</span></div>
        <button class="cell-rm" onclick="rmImg(event,this)">✕</button>
        <input class="cell-file" type="file" onchange="loadImg(event,this)" />
      </div>

      <!-- Row 2 -->
      <div class="cell c-place">
        <span class="cell-label">Place</span>

        <div class="cell-add"><svg viewBox="0 0 24 24">
            <rect x="3" y="3" width="18" height="18" rx="2" />

            <polyline points="21 15 16 10 5 21" />
          </svg><span>photo</span></div>
        <button class="cell-rm" onclick="rmImg(event,this)">✕</button>
        <input class="cell-file" type="file" onchange="loadImg(event,this)" />
      </div>

      <div class="cell c-free">
        <span class="cell-label">Free Space ✦</span>
        <div class="cell-img"></div>

            <circle cx="8.5" cy="8.5" r="1.5" />
            <polyline points="21 15 16 10 5 21" />
          </svg><span>photo</span></div>
        <button class="cell-rm" onclick="rmImg(event,this)">✕</button>
        <input class="cell-file" type="file" onchange="loadImg(event,this)" />
      </div>

      <div class="cell c-season c-col4">
        <span class="cell-label">Season</span>
        <div class="cell-img"></div>
        <div class="cell-add"><svg viewBox="0 0 24 24">
            <rect x="3" y="3" width="18" height="18" rx="2" />
            <circle cx="8.5" cy="8.5" r="1.5" />
            <polyline points="21 15 16 10 5 21" />
          </svg><span>photo</span></div>
        <button class="cell-rm" onclick="rmImg(event,this)">✕</button>
        <input class="cell-file" type="file" onchange="loadImg(event,this)" />
      </div>

      <!-- Row 3 -->
      <div class="cell c-hobby">
        <span class="cell-label">Hobby</span>
        <div class="cell-img"></div>
        <div class="cell-add"><svg viewBox="0 0 24 24">
            <rect x="3" y="3" width="18" height="18" rx="2" />
            <circle cx="8.5" cy="8.5" r="1.5" />
            <polyline points="21 15 16 10 5 21" />
          </svg><span>photo</span></div>
        <button class="cell-rm" onclick="rmImg(event,this)">✕</button>
        <input class="cell-file" type="file" onchange="loadImg(event,this)" />
      </div>

      <div class="cell c-music c-col4">
        <span class="cell-label">Music</span>
        <div class="cell-img"></div>
        <div class="cell-add"><svg viewBox="0 0 24 24">
            <rect x="3" y="3" width="18" height="18" rx="2" />
            <circle cx="8.5" cy="8.5" r="1.5" />
            <polyline points="21 15 16 10 5 21" />
          </svg><span>photo</span></div>
        <button class="cell-rm" onclick="rmImg(event,this)">✕</button>
        <input class="cell-file" type="file" onchange="loadImg(event,this)" />
      </div>

      <!-- Row 4 -->
      <div class="cell c-career c-row4">
        <span class="cell-label">Career Path</span>
        <div class="cell-img"></div>
        <div class="cell-add"><svg viewBox="0 0 24 24">
            <rect x="3" y="3" width="18" height="18" rx="2" />
            <circle cx="8.5" cy="8.5" r="1.5" />
            <polyline points="21 15 16 10 5 21" />
          </svg><span>photo</span></div>
        <button class="cell-rm" onclick="rmImg(event,this)">✕</button>
        <input class="cell-file" type="file" onchange="loadImg(event,this)" />
      </div>

      <div class="cell c-flower c-row4">
        <span class="cell-label">Flower</span>
        <div class="cell-img"></div>
        <div class="cell-add"><svg viewBox="0 0 24 24">
            <rect x="3" y="3" width="18" height="18" rx="2" />
            <circle cx="8.5" cy="8.5" r="1.5" />
            <polyline points="21 15 16 10 5 21" />
          </svg><span>photo</span></div>
        <button class="cell-rm" onclick="rmImg(event,this)">✕</button>
        <input class="cell-file" type="file" onchange="loadImg(event,this)" />
      </div>

      <div class="cell c-animal c-row4">
        <span class="cell-label">Animal</span>
        <div class="cell-img"></div>
        <div class="cell-add"><svg viewBox="0 0 24 24">
            <rect x="3" y="3" width="18" height="18" rx="2" />
            <circle cx="8.5" cy="8.5" r="1.5" />
            <polyline points="21 15 16 10 5 21" />
          </svg><span>photo</span></div>
        <button class="cell-rm" onclick="rmImg(event,this)">✕</button>
        <input class="cell-file" type="file" onchange="loadImg(event,this)" />
      </div>

      <div class="cell c-fav c-col4 c-row4">
        <span class="cell-label">App / Game</span>
        <div class="cell-img"></div>
        <div class="cell-add"><svg viewBox="0 0 24 24">
            <rect x="3" y="3" width="18" height="18" rx="2" />
            <circle cx="8.5" cy="8.5" r="1.5" />
            <polyline points="21 15 16 10 5 21" />
          </svg><span>photo</span></div>
        <button class="cell-rm" onclick="rmImg(event,this)">✕</button>
        <input class="cell-file" type="file" onchange="loadImg(event,this)" />
      </div>

    </div>

    <!-- Actions -->
    <div class="actions">
      <button class="action-btn btn-save" onclick="saveImage()">Save</button>
      <button class="action-btn btn-clear" onclick="clearAll()">Clear</button>
    </div>
    
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="script.js"></script>
</body>

</html>
